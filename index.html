<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🎯 Bắn Thú Vui Vẻ!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{ --ui-bg:rgba(255,255,255,0.95); --sc:1; }
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(180deg,#87CEEB 0%,#C8EEFF 52%,#5DBB63 52%,#3D9142 100%);
  width:100vw;height:100dvh;
  cursor:default;user-select:none;position:relative;
}

/* SUN */
#sun{position:absolute;top:14px;left:28px;width:68px;height:68px;
  background:radial-gradient(circle,#FFE033 40%,#FFB300 100%);
  border-radius:50%;box-shadow:0 0 40px 14px rgba(255,210,0,0.45);
  animation:sunPulse 3s ease-in-out infinite;pointer-events:none;z-index:1;}
@keyframes sunPulse{0%,100%{box-shadow:0 0 40px 14px rgba(255,210,0,0.45);}50%{box-shadow:0 0 60px 22px rgba(255,210,0,0.65);}}

/* CLOUDS */
.cloud{position:absolute;background:white;border-radius:50px;opacity:0.92;
  box-shadow:0 4px 16px rgba(0,0,0,0.07);animation:cloudDrift linear infinite;
  pointer-events:none;z-index:1;}
@keyframes cloudDrift{from{left:110%}to{left:-400px}}

/* HILLS & GRASS */
#hills{position:absolute;bottom:0;left:0;right:0;height:40%;pointer-events:none;z-index:1;}
.hill{position:absolute;bottom:0;background:#2e7d32;border-radius:50% 50% 0 0;opacity:0.22;}

/* FLOWERS */
.flower{position:absolute;animation:flowerSway 2s ease-in-out infinite alternate;pointer-events:none;z-index:2;}
@keyframes flowerSway{from{transform:rotate(-7deg);}to{transform:rotate(7deg);}}

/* TIMER BAR */
#timer-bar-wrap{position:absolute;top:0;left:0;right:0;height:10px;z-index:200;}
#timer-bar{height:100%;background:linear-gradient(90deg,#4ade80,#facc15,#f87171);
  transition:width 0.8s linear;border-radius:0 5px 5px 0;}

/* HUD — top left: score+level+progress, top right: lives */
#hud-left{
  position:absolute;top:16px;left:14px;z-index:150;
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;
}
#hud-right{
  position:absolute;top:16px;right:14px;z-index:150;
}
.hud-box{
  background:var(--ui-bg);border-radius:18px;
  box-shadow:0 3px 12px rgba(0,0,0,0.14);
  padding:6px 16px;font-weight:700;white-space:nowrap;
}
#score-box{font-size:clamp(1.3rem,5vw,1.8rem);color:#FF6B35;font-weight:900;}
#level-box{font-size:clamp(0.85rem,3.5vw,1.1rem);color:#444;}
#progress-box{font-size:clamp(0.85rem,3.5vw,1.05rem);color:#555;}
#lives-box{font-size:clamp(1.4rem,5.5vw,2rem);}

/* ARENA — full screen, sits above background, below HUD */
#arena{position:absolute;inset:0;z-index:5;touch-action:none;}

/* ANIMALS */
.animal{
  position:absolute;cursor:pointer;user-select:none;touch-action:none;
  filter:drop-shadow(2px 5px 8px rgba(0,0,0,0.3));
  text-align:center;
  -webkit-tap-highlight-color:transparent;
  transition:filter 0.1s;
}
.animal:active{filter:drop-shadow(2px 5px 8px rgba(0,0,0,0.3)) brightness(1.4);}
.animal .emoji{display:block;line-height:1.05;}
.animal .nametag{
  text-align:center;font-weight:900;
  background:rgba(255,255,255,0.94);
  border-radius:10px;padding:3px 9px;
  margin-top:4px;white-space:nowrap;color:#222;
  display:inline-block;box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

/* HIT EFFECTS */
.hit-burst{position:fixed;pointer-events:none;z-index:400;animation:burst 0.65s ease-out forwards;}
@keyframes burst{
  0%{opacity:1;transform:scale(0.5) rotate(0deg);}
  50%{opacity:1;transform:scale(1.8) rotate(15deg) translateY(-40px);}
  100%{opacity:0;transform:scale(2.2) rotate(30deg) translateY(-90px);}
}
.score-popup{position:fixed;pointer-events:none;z-index:400;
  font-weight:900;color:#FFD700;
  text-shadow:0 2px 8px rgba(0,0,0,0.5);
  animation:scoreFloat 0.9s ease-out forwards;
  font-size:clamp(1.6rem,6vw,2.2rem);
}
@keyframes scoreFloat{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-75px);}}

/* MISS FLASH */
#miss-flash{position:fixed;inset:0;z-index:290;background:rgba(255,0,0,0.25);pointer-events:none;opacity:0;transition:opacity 0.12s;}

/* ══════════════════════════════════
   REVEAL MODAL — fullscreen, big, tap anywhere to close
══════════════════════════════════ */
#reveal-modal{
  position:fixed;inset:0;z-index:600;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.6);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  cursor:pointer;
}
#reveal-modal.show{display:flex;}

#reveal-card{
  background:linear-gradient(160deg,#fffbf0 0%,#fff0ea 50%,#ffe4f0 100%);
  border-radius:clamp(20px,5vw,36px);
  padding:clamp(20px,5vw,44px) clamp(20px,6vw,52px);
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,0.4);
  animation:popIn 0.38s cubic-bezier(0.34,1.56,0.64,1);
  /* Big on all screens */
  width:min(92vw,520px);
  cursor:default;
}
@keyframes popIn{from{transform:scale(0.1);opacity:0;}to{transform:scale(1);opacity:1;}}

#reveal-emoji{
  font-size:clamp(5.5rem,20vw,11rem);
  display:block;margin-bottom:10px;
  animation:revealBounce 0.65s cubic-bezier(0.34,1.56,0.64,1);
  line-height:1;
}
@keyframes revealBounce{0%{transform:scale(0.2);}70%{transform:scale(1.18);}100%{transform:scale(1);}}

#reveal-name-vi{
  font-size:clamp(2rem,8vw,3.4rem);
  font-weight:900;color:#FF6B35;
  text-shadow:0 2px 0 rgba(255,107,53,0.15);
}
#reveal-name-en{
  font-size:clamp(1rem,4vw,1.5rem);
  font-weight:700;color:#aaa;margin-top:4px;
}
#reveal-fun-fact{
  font-size:clamp(1rem,3.8vw,1.3rem);
  color:#444;margin-top:14px;line-height:1.6;
  font-weight:700;
  background:rgba(255,107,53,0.08);
  border-radius:14px;padding:12px 16px;
}
#reveal-tap-hint{
  font-size:clamp(0.85rem,3vw,1.1rem);
  color:#ccc;margin-top:16px;font-weight:700;
  letter-spacing:0.03em;
}
#reveal-btn{
  margin-top:18px;
  background:linear-gradient(135deg,#FF6B35,#FF3B6B);
  color:white;border:none;border-radius:50px;
  padding:clamp(13px,4vw,18px) clamp(30px,10vw,56px);
  font-size:clamp(1.1rem,5vw,1.5rem);
  font-weight:900;cursor:pointer;
  box-shadow:0 8px 28px rgba(255,107,53,0.5);
  font-family:'Nunito',sans-serif;transition:transform 0.12s;
  display:block;width:100%;
}
#reveal-btn:active{transform:scale(0.92);}

/* ══════════════════════════════════
   OVERLAY SCREENS
══════════════════════════════════ */
.overlay-screen{
  position:fixed;inset:0;z-index:700;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.48);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.screen-card{
  background:linear-gradient(135deg,#fff9f0,#ffe8f0);
  border-radius:clamp(20px,5vw,32px);
  padding:clamp(22px,6vw,44px);
  text-align:center;
  box-shadow:0 24px 70px rgba(0,0,0,0.35);
  width:min(90vw,440px);
  animation:popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
}
.screen-title{font-size:clamp(2rem,9vw,3.4rem);font-weight:900;color:#FF6B35;margin-bottom:8px;}
.screen-sub{font-size:clamp(0.9rem,3.8vw,1.15rem);color:#666;margin-bottom:20px;line-height:1.6;}
.big-btn{
  background:linear-gradient(135deg,#4ade80,#22c55e);
  color:white;border:none;border-radius:50px;
  padding:clamp(14px,4.5vw,20px) clamp(34px,11vw,60px);
  font-size:clamp(1.1rem,5.5vw,1.6rem);font-weight:900;cursor:pointer;
  box-shadow:0 6px 22px rgba(74,222,128,0.45);
  font-family:'Nunito',sans-serif;transition:transform 0.12s;
  -webkit-tap-highlight-color:transparent;display:block;width:100%;
}
.big-btn:active{transform:scale(0.93);}
.animals-parade{font-size:clamp(1.8rem,8vw,3rem);margin:10px 0;
  animation:parade 1.2s ease-in-out infinite alternate;letter-spacing:4px;}
@keyframes parade{from{letter-spacing:3px;}to{letter-spacing:10px;}}

/* AUDIO BANNER */
#audio-banner{
  position:fixed;bottom:0;left:0;right:0;z-index:800;
  background:linear-gradient(135deg,#FF6B35,#FF3B6B);
  color:white;text-align:center;
  padding:clamp(14px,4vw,20px);
  font-size:clamp(1rem,4.5vw,1.3rem);font-weight:900;
  cursor:pointer;display:none;
  font-family:'Nunito',sans-serif;
  box-shadow:0 -4px 20px rgba(0,0,0,0.3);
  animation:bannerPulse 1.5s ease-in-out infinite alternate;
}
@keyframes bannerPulse{from{opacity:0.88;}to{opacity:1;}}
</style>
</head>

<script>

  {emoji:'🦣',vi:'Voi Ma Mút',en:'Mammoth',fact:'Voi ma mút sống từ thời băng hà 10.000 năm trước! 🧊',size:250},

/* LEVELS — no ammo limit, 5 lives, longer time */
const LEVELS=[
  {target:10, levelSec:60,  interval:2000, speed:0.75, maxAnimals:6,  despawnMs:9000},
  {target:14, levelSec:70,  interval:1700, speed:1.0,  maxAnimals:8,  despawnMs:8000},
  {target:18, levelSec:75,  interval:1400, speed:1.3,  maxAnimals:10, despawnMs:7500},
  {target:22, levelSec:80,  interval:1150, speed:1.6,  maxAnimals:12, despawnMs:7000},
  {target:28, levelSec:90,  interval:900,  speed:2.0,  maxAnimals:14, despawnMs:6500},
];

/* ══════════════════════════════════════════════════════
   RESPONSIVE SCALE
══════════════════════════════════════════════════════ */
function getScale(){
  const w=window.innerWidth;
  if(w<=380)return 0.60;
  if(w<=480)return 0.68;
  if(w<=768)return 0.82;
  if(w<=1024)return 0.92;
  return 1;
}
let SC=getScale();
window.addEventListener('resize',()=>{ SC=getScale(); });

/* ══════════════════════════════════════════════════════
   AUDIO ENGINE — Samsung Chrome / Android compatible
══════════════════════════════════════════════════════ */
let audioCtx=null,audioUnlocked=false,pendingQ=[];

function getCtx(){
  if(!audioCtx){
    try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100}); }
    catch(e){ return null; }
  }
  return audioCtx;
}

function unlockAudio(cb){
  const ac=getCtx();
  if(!ac)return;
  if(ac.state==='running'){ audioUnlocked=true; hideBanner(); cb&&cb(); return; }
  ac.resume().then(()=>{
    // Play a 1-frame silent buffer — mandatory for Samsung Chrome
    const buf=ac.createBuffer(1,1,22050);
    const src=ac.createBufferSource();
    src.buffer=buf; src.connect(ac.destination); src.start(0);
    audioUnlocked=true; hideBanner();
    pendingQ.forEach(f=>f()); pendingQ=[];
    cb&&cb();
  }).catch(()=>{ showBanner(); });
}

function showBanner(){ document.getElementById('audio-banner').style.display='block'; }
function hideBanner(){ document.getElementById('audio-banner').style.display='none'; }
document.getElementById('audio-banner').addEventListener('pointerdown',()=>unlockAudio(),{passive:true});

function safePlay(fn){
  if(audioUnlocked){ fn(); return; }
  pendingQ.push(fn);
  unlockAudio();
}

function tone(freq,type,dur,vol,delay){
  const ac=getCtx();
  if(!ac||!audioUnlocked)return;
  delay=delay||0; dur=dur||0.15; vol=vol||0.28;
  try{
    const o=ac.createOscillator(), g=ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type=type||'sine'; o.frequency.value=freq;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}

function playShoot(){ safePlay(()=>{ tone(800,'square',0.07,0.2); tone(300,'sawtooth',0.1,0.16,0.04); }); }
function playHit(){   safePlay(()=>{ [523,659,784,1047].forEach((f,i)=>tone(f,'sine',0.26,0.2,i*0.06)); }); }
function playMiss(){  safePlay(()=>{ tone(220,'sawtooth',0.18,0.18); tone(180,'sawtooth',0.18,0.16,0.1); }); }
function playLevelUp(){ safePlay(()=>{ [523,587,659,698,784,880,988,1047].forEach((f,i)=>tone(f,'sine',0.26,0.24,i*0.1)); }); }
function playGameOver(){ safePlay(()=>{ [370,320,270,220].forEach((f,i)=>tone(f,'sawtooth',0.28,0.2,i*0.15)); }); }

let bgOn=false,bgTimer=null,bgIdx=0;
const bgMel=[523,587,659,523,659,698,784,784,784,880,784,698,659,523,659,523];
function startBgMusic(){
  if(bgOn)return; bgOn=true;
  function note(){
    if(!bgOn)return;
    safePlay(()=>tone(bgMel[bgIdx%bgMel.length],'sine',0.22,0.055));
    bgIdx++; bgTimer=setTimeout(note,430);
  }
  note();
}
function stopBgMusic(){ bgOn=false; clearTimeout(bgTimer); }

/* ══════════════════════════════════════════════════════
   SPEECH — robust for Android
══════════════════════════════════════════════════════ */
const SS=window.speechSynthesis||null;
let voicesLoaded=false;
function loadVoices(){
  if(!SS||voicesLoaded)return;
  const v=SS.getVoices();
  if(v.length)voicesLoaded=true;
}
if(SS){
  loadVoices();
  SS.addEventListener('voiceschanged',loadVoices);
}

function speak(text){
  if(!SS)return;
  try{
    SS.cancel();
    setTimeout(()=>{
      const u=new SpeechSynthesisUtterance(text);
      u.lang='vi-VN'; u.rate=0.80; u.pitch=1.3; u.volume=1;
      const vi=SS.getVoices().find(v=>v.lang&&v.lang.startsWith('vi'));
      if(vi)u.voice=vi;
      SS.speak(u);
    },80);
  }catch(e){}
}

/* ══════════════════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════════════════ */
let score=0, lives=5, level=0, hits=0;
let animals=[], spawnTimer=null, timerInterval=null;
let gameActive=false, revealOpen=false, levelTime=60;
const arena=document.getElementById('arena');

/* ══════════════════════════════════════════════════════
   BACKGROUND
══════════════════════════════════════════════════════ */
function buildBackground(){
  document.querySelectorAll('.cloud,.flower').forEach(e=>e.remove());
  [{w:210,h:60,top:7,dur:34},{w:150,h:46,top:13,dur:46},{w:180,h:54,top:4,dur:27},{w:125,h:40,top:18,dur:54},{w:165,h:52,top:10,dur:40}].forEach(c=>{
    const el=document.createElement('div'); el.className='cloud';
    el.style.cssText=`width:${c.w}px;height:${c.h}px;top:${c.top}%;animation-duration:${c.dur}s;left:${10+Math.random()*70}%`;
    document.body.appendChild(el);
  });
  const fl=['🌸','🌺','🌻','🌼','🌷','🌹','🍀','🌿'];
  for(let i=0;i<12;i++){
    const el=document.createElement('div'); el.className='flower';
    el.textContent=fl[Math.floor(Math.random()*fl.length)];
    el.style.cssText=`left:${Math.random()*92}%;bottom:${Math.random()*18}%;font-size:${(1.0+Math.random()*0.9)*SC}rem;animation-delay:${Math.random()*2}s`;
    document.body.appendChild(el);
  }
  const hills=document.getElementById('hills'); hills.innerHTML='';
  [{w:68,h:80,l:0},{w:54,h:66,l:26},{w:60,h:72,l:50},{w:50,h:60,l:73}].forEach(h=>{
    const d=document.createElement('div'); d.className='hill';
    d.style.cssText=`width:${h.w}%;height:${h.h}%;left:${h.l}%`;
    hills.appendChild(d);
  });
}

/* ══════════════════════════════════════════════════════
   SPAWN — animals roam full screen height (5%–92%)
   Ground-level animals sit near bottom (grass area)
══════════════════════════════════════════════════════ */
function spawnAnimal(){
  const cfg=LEVELS[level];
  if(!gameActive||animals.length>=cfg.maxAnimals||revealOpen)return;

  const data=ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
  const el=document.createElement('div'); el.className='animal';

  const vw=window.innerWidth, vh=window.innerHeight;
  const fs=Math.round(data.size*SC);
  el.style.fontSize=fs+'px';

  // Full playfield: top 5% to bottom (leaving just a sliver for grass label)
  const minY=vh*0.06;
  const maxY=vh*0.90-fs*1.4; // animal + nametag fits above fold

  let x=8+Math.random()*Math.max(50,vw-fs-20);
  let y=minY+Math.random()*(maxY-minY);
  el.style.left=x+'px'; el.style.top=y+'px';

  const tagFs=Math.max(0.65,fs/148);
  el.innerHTML=`<span class="emoji">${data.emoji}</span><div class="nametag" style="font-size:${tagFs}rem">${data.vi}</div>`;

  // Speed — bigger = slower
  const baseMult=1.1+Math.random()*1.5;
  let spd=baseMult*cfg.speed*(165/Math.max(95,fs));
  spd=Math.max(0.4,Math.min(spd,6.5));
  let angle=Math.random()*Math.PI*2;
  let vx=Math.cos(angle)*spd, vy=Math.sin(angle)*spd;
  let bobPhase=Math.random()*Math.PI*2;

  const obj={el,data,x,y,vx,vy,minY,maxY,fs,spd,alive:true,bobPhase};
  animals.push(obj); arena.appendChild(el);

  const moveLoop=()=>{
    if(!obj.alive)return;
    const cvw=window.innerWidth, cvh=window.innerHeight;
    const cMaxY=cvh*0.90-fs*1.4;
    bobPhase+=0.055;
    x+=vx; y+=vy+Math.sin(bobPhase)*0.7;

    if(x<5){x=5;vx=Math.abs(vx);}
    if(x>cvw-fs-5){x=cvw-fs-5;vx=-Math.abs(vx);}
    if(y<obj.minY){y=obj.minY;vy=Math.abs(vy);}
    if(y>cMaxY){y=cMaxY;vy=-Math.abs(vy);}
    // Occasional direction change
    if(Math.random()<0.006){const a=Math.random()*Math.PI*2;vx=Math.cos(a)*spd;vy=Math.sin(a)*spd;}

    el.style.left=x+'px'; el.style.top=y+'px';
    el.querySelector('.emoji').style.transform=vx<0?'scaleX(-1)':'scaleX(1)';
    obj.x=x; obj.y=y;
    obj.raf=requestAnimationFrame(moveLoop);
  };
  obj.raf=requestAnimationFrame(moveLoop);
  obj.despawnTimer=setTimeout(()=>removeAnimal(obj,false), cfg.despawnMs+Math.random()*2500);

  el.addEventListener('pointerdown',e=>{
    e.preventDefault(); e.stopPropagation();
    if(!gameActive||revealOpen||!obj.alive)return;
    handleHit(obj,e.clientX,e.clientY);
  },{passive:false});
}

function removeAnimal(obj,hit){
  if(!obj.alive)return;
  obj.alive=false;
  cancelAnimationFrame(obj.raf);
  clearTimeout(obj.despawnTimer);
  if(obj.el.parentNode)obj.el.parentNode.removeChild(obj.el);
  animals=animals.filter(a=>a!==obj);
}

/* ══════════════════════════════════════════════════════
   HIT
══════════════════════════════════════════════════════ */
function handleHit(obj,cx,cy){
  // Immediately lock out everything else
  gameActive=false;
  revealOpen=true;
  unlockAudio(()=>{});
  playShoot(); playHit();
  showBurst(cx,cy,obj.data.emoji);
  showScorePopup(cx,cy,'+10');
  speak(obj.data.vi);
  removeAnimal(obj,true);
  score+=10; hits++;
  updateScore(); updateProgress();
  showReveal(obj.data);
}

function handleMiss(){
  playShoot(); playMiss();
  lives--; updateLives(); flashMiss();
  if(lives<=0)endGame();
}

function flashMiss(){
  const f=document.getElementById('miss-flash');
  f.style.opacity='1'; setTimeout(()=>f.style.opacity='0',180);
}

/* ══════════════════════════════════════════════════════
   EFFECTS
══════════════════════════════════════════════════════ */
function showBurst(x,y,emoji){
  const el=document.createElement('div'); el.className='hit-burst';
  const sz=Math.max(2,Math.round(2.8*SC));
  el.textContent=emoji;
  el.style.cssText=`left:${x-20}px;top:${y-20}px;font-size:${sz}rem`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),800);
}
function showScorePopup(x,y,txt){
  const el=document.createElement('div'); el.className='score-popup';
  el.textContent=txt;
  el.style.cssText=`left:${x}px;top:${y-24}px`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),1000);
}

/* ══════════════════════════════════════════════════════
   REVEAL — show popup, tap anywhere to close
══════════════════════════════════════════════════════ */
function showReveal(data){
  stopBgMusic();
  document.getElementById('reveal-emoji').textContent=data.emoji;
  document.getElementById('reveal-name-vi').textContent=data.vi;
  document.getElementById('reveal-name-en').textContent=data.en;
  document.getElementById('reveal-fun-fact').textContent=data.fact;
  document.getElementById('reveal-modal').classList.add('show');
  setTimeout(()=>speak(data.vi+'. '+data.fact), 200);
}

function closeReveal(){
  document.getElementById('reveal-modal').classList.remove('show');
  revealOpen=false;
  SS&&SS.cancel();
  if(hits>=LEVELS[level].target){ showLevelUp(); return; }
  // Short cooldown: don't re-enable gameActive until the closing tap's
  // entire event chain has fully resolved (pointerup fires after pointerdown).
  setTimeout(()=>{ gameActive=true; startBgMusic(); }, 50);
}

// Single listener on the reveal modal — handles all taps inside it
document.getElementById('reveal-modal').addEventListener('pointerdown',e=>{
  if(!revealOpen)return;
  e.stopPropagation();
  closeReveal();
},{passive:true});

/* ══════════════════════════════════════════════════════
   UI UPDATES
══════════════════════════════════════════════════════ */
function updateScore(){ document.getElementById('score').textContent=score; }
function updateLives(){ document.getElementById('lives-icons').textContent='❤️'.repeat(Math.max(0,lives)); }
function updateLevel(){
  document.getElementById('level-num').textContent=level+1;
  document.getElementById('target-disp').textContent=LEVELS[level].target;
}
function updateProgress(){ document.getElementById('hits-disp').textContent=hits; }
function updateTimerBar(f){ document.getElementById('timer-bar').style.width=(f*100)+'%'; }

/* ══════════════════════════════════════════════════════
   LEVEL FLOW
══════════════════════════════════════════════════════ */
function showLevelUp(){
  stopBgMusic(); clearAll(); playLevelUp();
  const nxt=level+1<LEVELS.length?'🎉 Lên màn '+(level+2)+'!':'🏆 Bé đã chinh phục tất cả!';
  document.getElementById('levelup-msg').textContent=nxt;
  document.getElementById('levelup-screen').style.display='flex';
}
function nextLevel(){
  document.getElementById('levelup-screen').style.display='none';
  if(level+1>=LEVELS.length){ endGame(true); return; }
  level++; hits=0;
  updateLevel(); updateProgress(); startLevel();
}
function startLevel(){
  gameActive=true; hits=0; clearInterval(timerInterval);
  levelTime=LEVELS[level].levelSec; updateTimerBar(1); updateProgress();
  timerInterval=setInterval(()=>{
    levelTime--;
    updateTimerBar(levelTime/LEVELS[level].levelSec);
    if(levelTime<=0){ clearInterval(timerInterval); endGame(); }
  },1000);
  const cfg=LEVELS[level];
  spawnTimer=setInterval(()=>{ if(gameActive&&!revealOpen)spawnAnimal(); },cfg.interval);
  const init=Math.min(5,cfg.maxAnimals);
  for(let i=0;i<init;i++)setTimeout(spawnAnimal,i*380);
  startBgMusic();
}
function clearAll(){
  clearInterval(spawnTimer); clearInterval(timerInterval);
  [...animals].forEach(a=>removeAnimal(a,false)); animals=[];
}

/* ══════════════════════════════════════════════════════
   START / END
══════════════════════════════════════════════════════ */
function startGame(){
  ['levelup-screen','gameover-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('start-screen').style.display='none';
  document.getElementById('reveal-modal').classList.remove('show');
  revealOpen=false; clearAll();
  score=0; lives=5; level=0; hits=0;
  updateScore(); updateLives(); updateLevel(); updateProgress();
  buildBackground();
  unlockAudio(()=>{}); // unlock on start tap
  startLevel();
}
function endGame(won){
  gameActive=false; stopBgMusic(); clearAll(); playGameOver();
  const msg='Bé ghi được: ⭐ '+score+' điểm! '+(score>=200?'🏆 Siêu xuất sắc!':score>=100?'🌟 Giỏi lắm!':'💪 Cố thêm nhé!');
  document.getElementById('final-score-msg').textContent=msg;
  document.getElementById('gameover-screen').style.display='flex';
}

/* ══════════════════════════════════════════════════════
   MISS detection — tap on arena background.
   Animal elements call e.stopPropagation() so taps on
   animals never reach here. Only bare-background taps do.
   Reveal modal also stopPropagates, so popup taps are safe.
══════════════════════════════════════════════════════ */
arena.addEventListener('pointerdown',e=>{
  if(!gameActive||revealOpen)return;
  handleMiss();
},{passive:true});

/* ══════════════════════════════════════════════════════
   WIRE BUTTONS
══════════════════════════════════════════════════════ */
document.getElementById('start-btn').addEventListener('pointerdown',e=>{e.stopPropagation();startGame();},{passive:true});
document.getElementById('nextlevel-btn').addEventListener('pointerdown',e=>{e.stopPropagation();nextLevel();},{passive:true});
document.getElementById('replay-btn').addEventListener('pointerdown',e=>{e.stopPropagation();startGame();},{passive:true});

/* ══════════════════════════════════════════════════════
   AUDIO UNLOCK on first any interaction
══════════════════════════════════════════════════════ */
['touchstart','pointerdown','click'].forEach(ev=>{
  document.addEventListener(ev,()=>unlockAudio(()=>{}),{once:true,passive:true});
});

/* ══════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════ */
buildBackground();
setTimeout(()=>{ if(!audioUnlocked)showBanner(); },2500);
</script>
