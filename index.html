<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎯 Bắn Thú Vui Vẻ!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --ui-bg: rgba(255,255,255,0.93); --score-color: #FF6B35; }
  body { font-family:'Nunito',sans-serif; background:linear-gradient(180deg,#87CEEB 0%,#E0F7FF 58%,#5DBB63 58%,#3D9142 100%); overflow:hidden; width:100vw; height:100vh; cursor:crosshair; user-select:none; }
  #sun { position:absolute; top:18px; left:36px; width:80px; height:80px; background:radial-gradient(circle,#FFE033 40%,#FFB300 100%); border-radius:50%; box-shadow:0 0 40px 14px rgba(255,210,0,0.45); animation:sunPulse 3s ease-in-out infinite; pointer-events:none; }
  @keyframes sunPulse { 0%,100%{box-shadow:0 0 40px 14px rgba(255,210,0,0.45);} 50%{box-shadow:0 0 60px 24px rgba(255,210,0,0.65);} }
  .cloud { position:absolute; background:white; border-radius:50px; opacity:0.92; box-shadow:0 4px 16px rgba(0,0,0,0.08); animation:cloudDrift linear infinite; pointer-events:none; }
  @keyframes cloudDrift { from{left:110%} to{left:-400px} }
  #hills { position:absolute; bottom:0; left:0; right:0; height:36%; pointer-events:none; }
  .hill { position:absolute; bottom:0; background:#2e7d32; border-radius:50% 50% 0 0; opacity:0.28; }
  .flower { position:absolute; animation:flowerSway 2s ease-in-out infinite alternate; pointer-events:none; }
  @keyframes flowerSway { from{transform:rotate(-6deg);} to{transform:rotate(6deg);} }
  #timer-bar-wrap { position:absolute; top:0; left:0; right:0; height:12px; z-index:99; }
  #timer-bar { height:100%; background:linear-gradient(90deg,#4ade80,#facc15,#f87171); transition:width 0.8s linear; border-radius:0 6px 6px 0; }
  #hud { position:absolute; top:18px; right:18px; z-index:100; display:flex; flex-direction:column; align-items:flex-end; gap:8px; }
  #score-box { background:var(--ui-bg); border-radius:20px; padding:10px 22px; font-size:2rem; font-weight:900; color:var(--score-color); box-shadow:0 4px 16px rgba(0,0,0,0.15); }
  #level-box,#ammo-box,#lives-box,#progress-box { background:var(--ui-bg); border-radius:20px; padding:8px 18px; font-weight:700; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
  #level-box { font-size:1.25rem; color:#444; }
  #ammo-box { font-size:1.5rem; }
  #lives-box { font-size:1.7rem; }
  #progress-box { font-size:1.1rem; color:#555; }
  .animal { position:absolute; cursor:pointer; user-select:none; filter:drop-shadow(3px 5px 8px rgba(0,0,0,0.3)); text-align:center; }
  .animal .emoji { display:block; line-height:1.05; }
  .animal .nametag { text-align:center; font-weight:900; background:rgba(255,255,255,0.92); border-radius:14px; padding:4px 10px; margin-top:4px; white-space:nowrap; color:#222; display:inline-block; box-shadow:0 2px 8px rgba(0,0,0,0.18); }
  .animal:active { transform:scale(0.82) !important; }
  .hit-burst { position:absolute; pointer-events:none; z-index:200; animation:burst 0.75s ease-out forwards; }
  @keyframes burst { 0%{opacity:1;transform:scale(0.5);} 60%{opacity:1;transform:scale(1.5) translateY(-50px);} 100%{opacity:0;transform:scale(1.8) translateY(-100px);} }
  .score-popup { position:absolute; pointer-events:none; z-index:200; font-size:2.2rem; font-weight:900; color:#FFD700; text-shadow:0 2px 8px rgba(0,0,0,0.5); animation:scoreFloat 1.1s ease-out forwards; }
  @keyframes scoreFloat { 0%{opacity:1;transform:translateY(0);} 100%{opacity:0;transform:translateY(-90px);} }
  #reveal-modal { position:absolute; inset:0; z-index:300; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.5); backdrop-filter:blur(5px); }
  #reveal-modal.show { display:flex; }
  #reveal-card { background:linear-gradient(135deg,#fff7ed,#ffe4e1); border-radius:32px; padding:36px 48px; text-align:center; box-shadow:0 24px 70px rgba(0,0,0,0.35); animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); max-width:400px; width:92%; }
  @keyframes popIn { from{transform:scale(0.2);opacity:0;} to{transform:scale(1);opacity:1;} }
  #reveal-emoji { font-size:8rem; display:block; margin-bottom:8px; animation:revealBounce 0.65s ease-out; }
  @keyframes revealBounce { 0%{transform:scale(0.3);} 70%{transform:scale(1.25);} 100%{transform:scale(1);} }
  #reveal-name-vi { font-size:2.6rem; font-weight:900; color:#FF6B35; }
  #reveal-name-en { font-size:1.3rem; font-weight:700; color:#999; margin-top:4px; }
  #reveal-fun-fact { font-size:1.05rem; color:#555; margin-top:12px; line-height:1.55; }
  #reveal-btn { margin-top:22px; background:linear-gradient(135deg,#FF6B35,#FF3B6B); color:white; border:none; border-radius:50px; padding:15px 44px; font-size:1.35rem; font-weight:900; cursor:pointer; box-shadow:0 6px 22px rgba(255,107,53,0.45); font-family:'Nunito',sans-serif; transition:transform 0.12s; }
  #reveal-btn:active{transform:scale(0.94);}
  #start-screen,#gameover-screen,#levelup-screen { position:absolute; inset:0; z-index:400; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.45); backdrop-filter:blur(7px); }
  #gameover-screen,#levelup-screen { display:none; }
  .screen-card { background:linear-gradient(135deg,#fff9f0,#ffe8f0); border-radius:32px; padding:40px; text-align:center; box-shadow:0 24px 70px rgba(0,0,0,0.35); max-width:420px; width:92%; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .screen-title { font-size:3.2rem; font-weight:900; color:#FF6B35; margin-bottom:10px; }
  .screen-sub { font-size:1.2rem; color:#666; margin-bottom:22px; line-height:1.5; }
  .big-btn { background:linear-gradient(135deg,#4ade80,#22c55e); color:white; border:none; border-radius:50px; padding:17px 54px; font-size:1.55rem; font-weight:900; cursor:pointer; box-shadow:0 6px 22px rgba(74,222,128,0.45); font-family:'Nunito',sans-serif; transition:transform 0.12s; }
  .big-btn:active{transform:scale(0.94);}
  .animals-parade { font-size:2.8rem; margin:12px 0; animation:parade 1.2s ease-in-out infinite alternate; }
  @keyframes parade{from{letter-spacing:4px;}to{letter-spacing:12px;}}
  #crosshair { position:absolute; pointer-events:none; z-index:500; width:56px; height:56px; margin-left:-28px; margin-top:-28px; opacity:0.85; }
  #miss-flash { position:absolute; inset:0; z-index:290; background:rgba(255,0,0,0.28); pointer-events:none; opacity:0; transition:opacity 0.18s; }
</style>
</head>
<body>
<div id="sun"></div>
<div id="hills"></div>
<div id="timer-bar-wrap"><div id="timer-bar" style="width:100%"></div></div>
<div id="hud">
  <div id="score-box">⭐ <span id="score">0</span></div>
  <div id="level-box">Màn <span id="level-num">1</span></div>
  <div id="progress-box">🎯 <span id="hits-disp">0</span> / <span id="target-disp">12</span></div>
  <div id="ammo-box"><span id="ammo-icons">🔫🔫🔫🔫🔫</span></div>
  <div id="lives-box"><span id="lives-icons">❤️❤️❤️</span></div>
</div>
<div id="miss-flash"></div>
<svg id="crosshair" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
  <circle cx="28" cy="28" r="22" fill="none" stroke="#FF3B6B" stroke-width="3.5"/>
  <circle cx="28" cy="28" r="5" fill="#FF3B6B"/>
  <line x1="28" y1="0" x2="28" y2="12" stroke="#FF3B6B" stroke-width="3.5"/>
  <line x1="28" y1="44" x2="28" y2="56" stroke="#FF3B6B" stroke-width="3.5"/>
  <line x1="0" y1="28" x2="12" y2="28" stroke="#FF3B6B" stroke-width="3.5"/>
  <line x1="44" y1="28" x2="56" y2="28" stroke="#FF3B6B" stroke-width="3.5"/>
</svg>
<div id="arena"></div>
<div id="reveal-modal">
  <div id="reveal-card">
    <span id="reveal-emoji">🐶</span>
    <div id="reveal-name-vi">Con Chó</div>
    <div id="reveal-name-en">Dog</div>
    <div id="reveal-fun-fact"></div>
    <button id="reveal-btn" onclick="closeReveal()">Tiếp tục! ▶</button>
  </div>
</div>
<div id="start-screen">
  <div class="screen-card">
    <div class="screen-title">🎯 Bắn Thú Vui Vẻ!</div>
    <div class="animals-parade">🐘🦁🐯🦒🐋🦊🐻🐼</div>
    <div class="screen-sub">Click vào các con thú để bắn!<br>🔊 Bật âm thanh để nghe tên thú nhé!</div>
    <button class="big-btn" onclick="startGame()">🎮 Bắt đầu chơi!</button>
  </div>
</div>
<div id="levelup-screen">
  <div class="screen-card">
    <div class="screen-title">🎉 Xuất sắc!</div>
    <div id="levelup-msg" style="font-size:1.4rem;font-weight:700;color:#555;margin-bottom:14px;">Lên màn 2!</div>
    <div class="animals-parade">🌟⭐💫✨🌟</div>
    <button class="big-btn" onclick="nextLevel()">▶ Màn tiếp theo!</button>
  </div>
</div>
<div id="gameover-screen">
  <div class="screen-card">
    <div class="screen-title">😅 Hết rồi!</div>
    <div id="final-score-msg" style="font-size:1.3rem;color:#555;margin-bottom:14px;">Điểm: 0</div>
    <div class="animals-parade">🐶🐱🐰🦊🐻</div>
    <button class="big-btn" onclick="startGame()">🔄 Chơi lại!</button>
  </div>
</div>
<script>
// ANIMAL DATA - size in px, scaled to real-world size
// Tiny(mouse,hamster): 80px | Small(cat,rabbit,bird): 110px
// Medium(dog,fox,pig): 140px | Large(tiger,lion,bear): 175px
// XLarge(hippo,giraffe,croc): 210px | Huge(elephant,whale): 250px
const ANIMALS = [
  // TINY ~80px
  {emoji:'🐭',vi:'Con Chuột',en:'Mouse',fact:'Chuột có thể chui qua lỗ nhỏ bằng đồng xu! 🧀',size:80},
  {emoji:'🐹',vi:'Con Hamster',en:'Hamster',fact:'Hamster nhồi thức ăn vào má to phồng! 🌰',size:80},
  {emoji:'🐞',vi:'Con Bọ Rùa',en:'Ladybug',fact:'Bọ rùa ăn sâu bọ để bảo vệ cây! 🌿',size:80},
  {emoji:'🦔',vi:'Con Nhím',en:'Hedgehog',fact:'Nhím có hơn 5000 gai trên lưng! 🦔',size:80},

  // SMALL ~110px
  {emoji:'🐱',vi:'Con Mèo',en:'Cat',fact:'Mèo ngủ tới 16 tiếng mỗi ngày! 😴',size:110},
  {emoji:'🐰',vi:'Con Thỏ',en:'Rabbit',fact:'Thỏ nhảy cao gần 1 mét! 🥕',size:110},
  {emoji:'🐔',vi:'Con Gà',en:'Chicken',fact:'Gà gáy báo thức mỗi buổi sáng! 🌅',size:110},
  {emoji:'🐸',vi:'Con Ếch',en:'Frog',fact:'Ếch nhảy xa gấp 20 lần thân mình! 🌿',size:110},
  {emoji:'🐦',vi:'Con Chim',en:'Bird',fact:'Chim hót líu lo mỗi buổi sáng! 🎵',size:110},
  {emoji:'🦆',vi:'Con Vịt',en:'Duck',fact:'Vịt vừa biết bay, bơi và chạy! 🌊',size:110},
  {emoji:'🐧',vi:'Chim Cánh Cụt',en:'Penguin',fact:'Chim cánh cụt bơi 25 km/h dưới nước! 🐟',size:110},
  {emoji:'🦉',vi:'Con Cú',en:'Owl',fact:'Cú có thể quay đầu 270 độ! 🌙',size:110},
  {emoji:'🐢',vi:'Con Rùa',en:'Turtle',fact:'Rùa có thể sống hơn 150 tuổi! 🌿',size:110},
  {emoji:'🦦',vi:'Con Rái Cá',en:'Otter',fact:'Rái cá nắm tay nhau khi ngủ để không trôi! 🤝',size:110},

  // MEDIUM ~140px
  {emoji:'🐶',vi:'Con Chó',en:'Dog',fact:'Chó ngửi mùi giỏi hơn người 100.000 lần! 🐾',size:140},
  {emoji:'🦊',vi:'Con Cáo',en:'Fox',fact:'Cáo rất thông minh và tinh nghịch! 🌿',size:140},
  {emoji:'🐷',vi:'Con Heo',en:'Pig',fact:'Heo thông minh hơn cả chó đấy! 🌟',size:140},
  {emoji:'🐵',vi:'Con Khỉ',en:'Monkey',fact:'Khỉ biết dùng công cụ như con người! 🍌',size:140},
  {emoji:'🐮',vi:'Con Bò',en:'Cow',fact:'Bò cho chúng ta sữa thơm ngon mỗi ngày! 🥛',size:140},
  {emoji:'🦡',vi:'Con Lửng',en:'Badger',fact:'Lửng là loài dũng cảm nhất trong thú nhỏ! 💪',size:140},
  {emoji:'🦌',vi:'Con Hươu',en:'Deer',fact:'Sừng hươu đực mọc lại mỗi năm! 🌳',size:140},
  {emoji:'🐑',vi:'Con Cừu',en:'Sheep',fact:'Cừu nhận ra được 50 khuôn mặt khác nhau! 🐑',size:140},
  {emoji:'🐐',vi:'Con Dê',en:'Goat',fact:'Dê leo núi rất giỏi, không sợ độ cao! ⛰️',size:140},

  // LARGE ~175px
  {emoji:'🐻',vi:'Con Gấu',en:'Bear',fact:'Gấu ngủ suốt cả mùa đông! 🍯',size:175},
  {emoji:'🐼',vi:'Gấu Trúc',en:'Panda',fact:'Gấu trúc ăn tre 12 tiếng mỗi ngày! 🎋',size:175},
  {emoji:'🐨',vi:'Gấu Koala',en:'Koala',fact:'Koala ngủ 22 tiếng mỗi ngày! 🌿',size:175},
  {emoji:'🐯',vi:'Con Hổ',en:'Tiger',fact:'Hổ là loài mèo to nhất thế giới! 🐅',size:175},
  {emoji:'🦁',vi:'Sư Tử',en:'Lion',fact:'Tiếng gầm sư tử nghe xa 8 km! 👑',size:175},
  {emoji:'🐺',vi:'Con Sói',en:'Wolf',fact:'Sói chạy được 60 km/h và sống thành bầy! 🌕',size:175},
  {emoji:'🦍',vi:'Con Gorilla',en:'Gorilla',fact:'Gorilla mạnh gấp 10 lần người! 💪',size:175},
  {emoji:'🐆',vi:'Con Báo',en:'Leopard',fact:'Báo chạy 90 km/h, nhanh nhất thế giới! ⚡',size:175},

  // XLARGE ~210px
  {emoji:'🦛',vi:'Hà Mã',en:'Hippo',fact:'Hà mã chạy nhanh 30 km/h dù rất to! 🏃',size:210},
  {emoji:'🦏',vi:'Con Tê Giác',en:'Rhino',fact:'Sừng tê giác làm từ keratin như móng tay! 💪',size:210},
  {emoji:'🦓',vi:'Con Ngựa Vằn',en:'Zebra',fact:'Mỗi con ngựa vằn có sọc khác nhau! 🦓',size:210},
  {emoji:'🐊',vi:'Cá Sấu',en:'Crocodile',fact:'Cá sấu sống từ thời khủng long! 🦕',size:210},
  {emoji:'🦒',vi:'Hươu Cao Cổ',en:'Giraffe',fact:'Hươu cao cổ cao tới 6 mét! 🌳',size:210},
  {emoji:'🐬',vi:'Cá Heo',en:'Dolphin',fact:'Cá heo thông minh, có ngôn ngữ riêng! 🌊',size:210},
  {emoji:'🦈',vi:'Cá Mập',en:'Shark',fact:'Cá mập có hàng chục hàng răng! 🦷',size:210},

  // HUGE ~250px
  {emoji:'🐘',vi:'Con Voi',en:'Elephant',fact:'Voi có trí nhớ tuyệt vời, không bao giờ quên! 🧠',size:250},
  {emoji:'🐳',vi:'Cá Voi Xanh',en:'Blue Whale',fact:'Cá voi xanh to bằng 30 con voi! 🌊',size:250},
  {emoji:'🦣',vi:'Voi Ma Mút',en:'Mammoth',fact:'Voi ma mút sống từ thời băng hà 10.000 năm trước! 🧊',size:250},
];

// LEVELS - 60-90s per level, more animals
const LEVELS = [
  {name:'Màn 1',target:12,ammo:25,levelSec:60,interval:1800,speed:0.8,maxAnimals:10,despawnMs:8000},
  {name:'Màn 2',target:16,ammo:28,levelSec:70,interval:1500,speed:1.1,maxAnimals:12,despawnMs:7500},
  {name:'Màn 3',target:20,ammo:30,levelSec:75,interval:1250,speed:1.4,maxAnimals:14,despawnMs:7000},
  {name:'Màn 4',target:25,ammo:34,levelSec:80,interval:1050,speed:1.7,maxAnimals:16,despawnMs:6500},
  {name:'Màn 5',target:30,ammo:40,levelSec:90,interval:850,speed:2.0,maxAnimals:18,despawnMs:6000},
];

// AUDIO
let ctx;
function ensureAudio(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();}
function playTone(freq,type,dur,vol,delay){
  if(!ctx)return;delay=delay||0;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.3,ctx.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+(dur||0.15));
  o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+(dur||0.15));
}
function playShoot(){playTone(900,'square',0.07,0.22);playTone(320,'sawtooth',0.1,0.18,0.04);}
function playHit(){[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.28,0.22,i*0.065));}
function playMiss(){playTone(230,'sawtooth',0.22,0.2);playTone(190,'sawtooth',0.22,0.2,0.12);}
function playLevelUp(){[523,587,659,698,784,880,988,1047].forEach((f,i)=>playTone(f,'sine',0.28,0.28,i*0.1));}
function playGameOver(){[380,330,280,230].forEach((f,i)=>playTone(f,'sawtooth',0.32,0.22,i*0.16));}
let bgOn=false,bgT,bgI=0;
const bgMel=[523,587,659,523,659,698,784,784,784,880,784,698,659,523,659,523];
function startBgMusic(){if(bgOn)return;bgOn=true;function n(){if(!bgOn)return;ensureAudio();playTone(bgMel[bgI%bgMel.length],'sine',0.24,0.07);bgI++;bgT=setTimeout(n,400);}n();}
function stopBgMusic(){bgOn=false;clearTimeout(bgT);}
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='vi-VN';u.rate=0.82;u.pitch=1.35;u.volume=1;
  const vi=speechSynthesis.getVoices().find(v=>v.lang.startsWith('vi'));
  if(vi)u.voice=vi;
  speechSynthesis.speak(u);
}

// GAME STATE
let score=0,lives=10,ammo=25,level=0,hits=0;
let animals=[],spawnTimer,timerInterval;
let gameActive=false,revealOpen=false,levelTime=60;
const arena=document.getElementById('arena');

// BACKGROUND
function buildBackground(){
  document.querySelectorAll('.cloud,.flower').forEach(e=>e.remove());
  [{w:220,h:65,top:8,dur:32},{w:160,h:50,top:14,dur:42},{w:190,h:58,top:5,dur:25},{w:130,h:44,top:20,dur:50},{w:175,h:55,top:11,dur:38}].forEach(c=>{
    const el=document.createElement('div');el.className='cloud';
    el.style.cssText=`width:${c.w}px;height:${c.h}px;top:${c.top}%;animation-duration:${c.dur}s;left:${Math.random()*75}%`;
    document.body.appendChild(el);
  });
  const fl=['🌸','🌺','🌻','🌼','🌷','🌹','🍀','🌿'];
  for(let i=0;i<14;i++){
    const el=document.createElement('div');el.className='flower';
    el.textContent=fl[Math.floor(Math.random()*fl.length)];
    el.style.cssText=`left:${Math.random()*94}%;bottom:${Math.random()*18}%;font-size:${1.2+Math.random()*1.2}rem;animation-delay:${Math.random()*2}s`;
    document.body.appendChild(el);
  }
  const hills=document.getElementById('hills');hills.innerHTML='';
  [{w:65,h:82,l:0},{w:52,h:68,l:28},{w:58,h:74,l:52},{w:48,h:62,l:74}].forEach(h=>{
    const d=document.createElement('div');d.className='hill';
    d.style.cssText=`width:${h.w}%;height:${h.h}%;left:${h.l}%`;
    hills.appendChild(d);
  });
}

// CROSSHAIR
const crosshair=document.getElementById('crosshair');
document.addEventListener('mousemove',e=>{crosshair.style.left=e.clientX+'px';crosshair.style.top=e.clientY+'px';});

// SPAWN
function spawnAnimal(){
  const cfg=LEVELS[level];
  if(!gameActive||animals.length>=cfg.maxAnimals||revealOpen)return;
  const data=ANIMALS[Math.floor(Math.random()*ANIMALS.length)];
  const el=document.createElement('div');el.className='animal';
  const fs=data.size;
  el.style.fontSize=fs+'px';
  const vw=window.innerWidth,vh=window.innerHeight;
  const minY=vh*0.04,maxY=vh*0.52;
  let x=Math.random()*Math.max(60,vw-fs-30)+10;
  let y=minY+Math.random()*(maxY-minY);
  el.style.left=x+'px';el.style.top=y+'px';
  const tagSize=Math.max(0.8,fs/130)+'rem';
  el.innerHTML=`<span class="emoji">${data.emoji}</span><div class="nametag" style="font-size:${tagSize}">${data.vi}</div>`;
  let angle=Math.random()*Math.PI*2;
  // Bigger animals move slower (realistic)
  let spd=(1.3+Math.random()*1.8)*cfg.speed*(180/Math.max(110,fs));
  let vx=Math.cos(angle)*spd,vy=Math.sin(angle)*spd;
  let bobPhase=Math.random()*Math.PI*2;
  const obj={el,data,x,y,vx,vy,minY,maxY,alive:true,bobPhase,fs,spd};
  animals.push(obj);arena.appendChild(el);
  const move=()=>{
    if(!obj.alive)return;
    bobPhase+=0.055;
    x+=vx;y+=vy+Math.sin(bobPhase)*0.8;
    if(x<10){x=10;vx=Math.abs(vx);}
    if(x>vw-fs-10){x=vw-fs-10;vx=-Math.abs(vx);}
    if(y<minY){y=minY;vy=Math.abs(vy);}
    if(y>maxY){y=maxY;vy=-Math.abs(vy);}
    if(Math.random()<0.007){const a=Math.random()*Math.PI*2;vx=Math.cos(a)*spd;vy=Math.sin(a)*spd;}
    el.style.left=x+'px';el.style.top=y+'px';
    el.querySelector('.emoji').style.transform=vx<0?'scaleX(-1)':'scaleX(1)';
    obj.x=x;obj.y=y;
    obj.raf=requestAnimationFrame(move);
  };
  obj.raf=requestAnimationFrame(move);
  obj.despawnTimer=setTimeout(()=>removeAnimal(obj,false),cfg.despawnMs+Math.random()*3000);
  el.addEventListener('pointerdown',e=>{
    e.stopPropagation();
    if(!gameActive||revealOpen||!obj.alive||ammo<=0)return;
    handleHit(obj,e.clientX,e.clientY);
  });
}

function removeAnimal(obj,hit){
  if(!obj.alive)return;
  obj.alive=false;cancelAnimationFrame(obj.raf);clearTimeout(obj.despawnTimer);
  if(obj.el.parentNode)obj.el.parentNode.removeChild(obj.el);
  animals=animals.filter(a=>a!==obj);
}

// HIT / MISS
function handleHit(obj,cx,cy){
  ensureAudio();playShoot();playHit();
  ammo--;updateAmmo();
  showBurst(cx,cy,obj.data.emoji);showScorePopup(cx,cy,'+10');
  speak(obj.data.vi);
  removeAnimal(obj,true);
  score+=10;hits++;updateScore();updateProgress();
  showReveal(obj.data);
}
function handleMiss(){
  ensureAudio();playShoot();playMiss();
  ammo--;updateAmmo();lives--;updateLives();flashMiss();
  if(lives<=0)endGame();else if(ammo<=0)checkAmmo();
}
function flashMiss(){const f=document.getElementById('miss-flash');f.style.opacity='1';setTimeout(()=>f.style.opacity='0',200);}

// EFFECTS
function showBurst(x,y,emoji){
  const el=document.createElement('div');el.className='hit-burst';
  el.textContent=emoji;el.style.cssText=`left:${x-25}px;top:${y-25}px;font-size:3rem`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),850);
}
function showScorePopup(x,y,txt){
  const el=document.createElement('div');el.className='score-popup';
  el.textContent=txt;el.style.cssText=`left:${x}px;top:${y-30}px`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
}

// REVEAL
function showReveal(data){
  revealOpen=true;gameActive=false;stopBgMusic();
  document.getElementById('reveal-emoji').textContent=data.emoji;
  document.getElementById('reveal-name-vi').textContent=data.vi;
  document.getElementById('reveal-name-en').textContent=data.en;
  document.getElementById('reveal-fun-fact').textContent=data.fact;
  document.getElementById('reveal-modal').classList.add('show');
  setTimeout(()=>speak(data.vi+'. '+data.fact),350);
}
function closeReveal(){
  document.getElementById('reveal-modal').classList.remove('show');
  revealOpen=false;
  if(hits>=LEVELS[level].target){showLevelUp();return;}
  if(ammo<=0){endGame();return;}
  gameActive=true;startBgMusic();
}

// UI
function updateScore(){document.getElementById('score').textContent=score;}
function updateLives(){document.getElementById('lives-icons').textContent='❤️'.repeat(Math.max(0,lives));}
function updateAmmo(){const a=Math.max(0,ammo);document.getElementById('ammo-icons').textContent=a>0?'🔫'.repeat(Math.min(a,12)):'❌';}
function updateLevel(){document.getElementById('level-num').textContent=level+1;document.getElementById('target-disp').textContent=LEVELS[level].target;}
function updateProgress(){document.getElementById('hits-disp').textContent=hits;}
function updateTimerBar(f){document.getElementById('timer-bar').style.width=(f*100)+'%';}
function checkAmmo(){if(ammo<=0&&hits<LEVELS[level].target)endGame();}

// LEVEL FLOW
function showLevelUp(){
  stopBgMusic();clearAll();playLevelUp();
  const nxt=level+1<LEVELS.length?'🎉 Lên màn '+(level+2)+'!':'🏆 Bé đã chinh phục tất cả!';
  document.getElementById('levelup-msg').textContent=nxt;
  document.getElementById('levelup-screen').style.display='flex';
}
function nextLevel(){
  document.getElementById('levelup-screen').style.display='none';
  if(level+1>=LEVELS.length){endGame(true);return;}
  level++;ammo=LEVELS[level].ammo;hits=0;
  updateAmmo();updateLevel();updateProgress();startLevel();
}
function startLevel(){
  gameActive=true;hits=0;clearInterval(timerInterval);
  levelTime=LEVELS[level].levelSec;updateTimerBar(1);updateProgress();
  timerInterval=setInterval(()=>{
    levelTime--;updateTimerBar(levelTime/LEVELS[level].levelSec);
    if(levelTime<=0){clearInterval(timerInterval);endGame();}
  },1000);
  const cfg=LEVELS[level];
  spawnTimer=setInterval(()=>{if(gameActive&&!revealOpen)spawnAnimal();},cfg.interval);
  const init=Math.min(5,cfg.maxAnimals);
  for(let i=0;i<init;i++)setTimeout(spawnAnimal,i*400);
  startBgMusic();
}
function clearAll(){
  clearInterval(spawnTimer);clearInterval(timerInterval);
  animals.forEach(a=>removeAnimal(a,false));animals=[];
}

// START / END
function startGame(){
  ['start-screen','gameover-screen','levelup-screen'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('reveal-modal').classList.remove('show');
  clearAll();
  score=0;lives=10;level=0;hits=0;ammo=LEVELS[0].ammo;
  updateScore();updateLives();updateAmmo();updateLevel();updateProgress();
  buildBackground();ensureAudio();startLevel();
}
function endGame(won){
  gameActive=false;stopBgMusic();clearAll();playGameOver();
  const msg='Bé ghi được: ⭐ '+score+' điểm! '+(score>=200?'🏆 Siêu xuất sắc!':score>=100?'🌟 Giỏi lắm!':'💪 Cố thêm nhé!');
  document.getElementById('final-score-msg').textContent=msg;
  document.getElementById('gameover-screen').style.display='flex';
}

// MISS on background
document.addEventListener('pointerdown',e=>{
  if(!gameActive||revealOpen)return;
  const t=e.target;
  if(t===document.body||t===arena||t.id==='arena'){if(ammo>0)handleMiss();}
});

if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.addEventListener('voiceschanged',()=>speechSynthesis.getVoices());}
buildBackground();
</script>
</body>
